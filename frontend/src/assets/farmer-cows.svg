<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f5f5dc" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#g)"/>

  <!-- Field -->
  <path d="M0,520 C210,450 420,590 650,520 C860,460 1010,520 1200,470 L1200,700 L0,700 Z"
        fill="#14532d" opacity="0.20" filter="url(#blur)"/>

  <!-- Cows (simple silhouettes) -->
  <g opacity="0.35" filter="url(#blur)">
    <ellipse cx="820" cy="540" rx="110" ry="55" fill="#0f766e"/>
    <ellipse cx="690" cy="560" rx="100" ry="48" fill="#0ea5e9"/>
  </g>

  <!-- Farmer -->
  <g opacity="0.38" filter="url(#blur)">
    <circle cx="360" cy="390" r="42" fill="#22c55e"/>
    <rect x="325" y="420" width="70" height="160" rx="25" fill="#16a34a"/>
    <path d="M260,560 C320,500 410,500 470,560 C395,595 335,595 260,560 Z" fill="#0f766e"/>
    <path d="M470,430 C540,350 600,340 670,370 C610,420 545,470 470,430 Z" fill="#60a5fa"/>
  </g>

  <!-- Subtle grainy dots -->
  <g opacity="0.14">
    <circle cx="120" cy="160" r="2" fill="#ffffff"/>
    <circle cx="240" cy="210" r="2" fill="#ffffff"/>
    <circle cx="360" cy="140" r="2" fill="#ffffff"/>
    <circle cx="520" cy="190" r="2" fill="#ffffff"/>
    <circle cx="700" cy="150" r="2" fill="#ffffff"/>
    <circle cx="890" cy="220" r="2" fill="#ffffff"/>
    <circle cx="1040" cy="170" r="2" fill="#ffffff"/>
  </g>
</svg>

